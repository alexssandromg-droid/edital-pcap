<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Edition - PC-AP Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --card-bg: #ffffff;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text-main);
            transition: background-color 0.3s ease;
            overflow-x: hidden;
            min-height: 100vh;
        }

        .subject-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .progress-bar-fill { transition: width 0.8s cubic-bezier(0.4, 0, 0.2, 1); }

        input[type="checkbox"] {
            appearance: none;
            width: 1.3rem;
            height: 1.3rem;
            border: 2px solid #cbd5e1;
            border-radius: 6px;
            cursor: pointer;
            display: grid;
            place-content: center;
            transition: 0.2s all;
        }

        input[type="checkbox"]::before {
            content: "";
            width: 0.75rem;
            height: 0.75rem;
            transform: scale(0);
            transition: 120ms transform ease-in-out;
            box-shadow: inset 1em 1em var(--primary);
            clip-path: polygon(14% 44%, 0 65%, 50% 100%, 100% 16%, 80% 0%, 43% 62%);
        }

        input[type="checkbox"]:checked { border-color: var(--primary); background-color: #f5f3ff; }
        input[type="checkbox"]:checked::before { transform: scale(1); }

        /* Auth Styles */
        #auth-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 2.5rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="auth-screen">
        <div class="auth-card">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-3xl font-black">P</div>
                <h2 id="auth-title" class="text-2xl font-black text-slate-900 tracking-tight">Bem-vindo à Elite</h2>
                <p id="auth-subtitle" class="text-slate-500 text-sm font-medium mt-1">Faça login para gerenciar seu edital</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1.5 ml-1">E-mail</label>
                    <input type="email" id="auth-email" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1.5 ml-1">Senha</label>
                    <input type="password" id="auth-password" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-500/20 transition-all">
                </div>
                
                <div id="auth-error" class="hidden text-rose-500 text-[10px] font-bold uppercase text-center bg-rose-50 py-2 rounded-xl border border-rose-100"></div>

                <button onclick="window.handleAuth()" id="auth-submit-btn" class="w-full bg-indigo-600 text-white font-black py-4.5 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all uppercase text-xs tracking-widest mt-4 flex items-center justify-center gap-2">
                    Acessar Plataforma
                </button>

                <div class="text-center pt-4">
                    <button onclick="window.toggleAuthMode()" id="auth-toggle-btn" class="text-[10px] font-black uppercase text-indigo-500 hover:text-indigo-700 tracking-widest">Ainda não tem conta? Cadastre-se</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-content" class="max-w-6xl mx-auto hidden">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start gap-8">
            <div class="flex-1">
                <div class="flex items-center gap-4 mb-4">
                    <div class="inline-flex items-center px-4 py-1.5 rounded-full bg-indigo-50 text-indigo-700 text-[10px] font-black uppercase tracking-widest border border-indigo-100">
                        Operacional Elite • Ciclo PC-AP
                    </div>
                    <button onclick="window.userLogout()" class="text-rose-400 hover:text-rose-600 text-[10px] font-black uppercase tracking-widest">Sair</button>
                </div>
                
                <h1 class="text-5xl font-black text-slate-900 tracking-tight" id="main-edital-title">PC-AP ELITE</h1>
                <p class="text-slate-500 font-semibold text-lg italic" id="main-edital-subtitle">Carregando...</p>
            </div>
            
            <div class="flex flex-col items-center gap-4 w-full md:w-auto">
                <div class="bg-white p-7 rounded-[2.5rem] shadow-xl border border-slate-100 min-w-[260px] text-center w-full">
                    <div class="text-5xl font-black text-indigo-600 mb-1" id="global-progress-pct">0%</div>
                    <div class="text-[10px] uppercase font-extrabold text-slate-400 tracking-widest">Conclusão Total</div>
                    <div class="w-full h-2.5 bg-slate-100 rounded-full mt-4 border border-slate-100 overflow-hidden">
                        <div id="global-progress-bar" class="h-full bg-indigo-500 progress-bar-fill"></div>
                    </div>
                </div>
            </div>
        </header>

        <nav class="flex overflow-x-auto gap-2 p-2 bg-white rounded-3xl mb-10 shadow-sm border border-slate-100 no-scrollbar">
            <button onclick="window.showTab('planner')" id="btn-planner" class="tab-btn active-btn flex-none py-3.5 px-8 rounded-2xl font-extrabold text-xs uppercase tracking-widest transition-all">📅 Planner</button>
            <button onclick="window.showTab('questoes')" id="btn-questoes" class="tab-btn flex-none text-slate-500 hover:bg-slate-50 py-3.5 px-8 rounded-2xl font-extrabold text-xs uppercase transition-all">🎯 Questões</button>
            <button onclick="window.showTab('evolucao')" id="btn-evolucao" class="tab-btn flex-none text-slate-500 hover:bg-slate-50 py-3.5 px-8 rounded-2xl font-extrabold text-xs uppercase transition-all">📈 Evolução</button>
        </nav>

        <div id="planner" class="tab-content active">
            <div id="edital-container" class="space-y-8"></div>
        </div>

        <div id="questoes" class="tab-content">
             <div class="grid grid-cols-1 lg:grid-cols-3 gap-8">
                <div class="bg-white p-8 rounded-[2.5rem] border border-slate-200 shadow-xl h-fit">
                    <h3 class="text-xl font-black mb-6 text-slate-800">Registrar Treino</h3>
                    <div class="space-y-4">
                        <select id="q-select-subject" class="w-full p-4 rounded-2xl border border-slate-200 bg-slate-50 font-bold text-xs outline-none"></select>
                        <div class="grid grid-cols-2 gap-4">
                            <input type="number" id="q-input-correct" placeholder="Acertos" class="w-full p-4 rounded-2xl border border-slate-200 bg-emerald-50 text-emerald-700 font-black text-center">
                            <input type="number" id="q-input-wrong" placeholder="Erros" class="w-full p-4 rounded-2xl border border-slate-200 bg-rose-50 text-rose-700 font-black text-center">
                        </div>
                        <button onclick="window.saveQuestionStats()" class="w-full bg-indigo-600 text-white font-black py-4.5 rounded-2xl shadow-lg hover:bg-indigo-700 transition-all uppercase text-xs tracking-widest mt-2">Salvar Treino</button>
                    </div>
                </div>
                <div class="lg:col-span-2 bg-white rounded-[2.5rem] border border-slate-200 shadow-sm overflow-hidden">
                    <table class="w-full text-left text-xs"><tbody id="stats-table-body"></tbody></table>
                </div>
            </div>
        </div>

        <div id="evolucao" class="tab-content">
            <div class="bg-white p-10 rounded-[3rem] border border-slate-200 shadow-sm">
                <div class="relative h-[400px] w-full"><canvas id="radarChart"></canvas></div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // CONFIGURAÇÕES REAIS DO ALEX
        const firebaseConfig = {
            apiKey: "AIzaSyCcHcryUJhFfKlh22-opI4cmgxazrU_Lkw",
            authDomain: "edital-pcap.firebaseapp.com",
            projectId: "edital-pcap",
            storageBucket: "edital-pcap.firebasestorage.app",
            messagingSenderId: "711033539612",
            appId: "1:711033539612:web:c970909cb11d69bbb123d9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let isRegistering = false;
        let userData = {};

        // --- AUTH LOGIC ---
        window.toggleAuthMode = () => {
            isRegistering = !isRegistering;
            document.getElementById('auth-title').innerText = isRegistering ? "Criar Nova Conta" : "Bem-vindo à Elite";
            document.getElementById('auth-submit-btn').innerText = isRegistering ? "Cadastrar Agora" : "Acessar Plataforma";
            document.getElementById('auth-toggle-btn').innerText = isRegistering ? "Já tem conta? Faça login" : "Ainda não tem conta? Cadastre-se";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const errorDiv = document.getElementById('auth-error');
            const btn = document.getElementById('auth-submit-btn');

            if(!email || !password) {
                errorDiv.innerText = "Preencha todos os campos";
                errorDiv.classList.remove('hidden');
                return;
            }

            btn.disabled = true;
            btn.innerText = "Processando...";
            errorDiv.classList.add('hidden');

            try {
                if(isRegistering) {
                    await createUserWithEmailAndPassword(auth, email, password);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (err) {
                errorDiv.innerText = "Erro: " + err.message;
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = isRegistering ? "Cadastrar Agora" : "Acessar Plataforma";
            }
        };

        window.userLogout = () => signOut(auth).then(() => location.reload());

        // --- DATA SYNC ---
        const initUserSession = async (user) => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');

            const userDocRef = doc(db, 'usuarios', user.uid);
            const docSnap = await getDoc(userDocRef);

            if (!docSnap.exists()) {
                userData = {
                    title: "PC-AP ELITE",
                    subtitle: "Foco Total Amapá",
                    subjects: [
                        { id: "sub_lp", name: "Português", color: "blue", topics: [{id: "t1", text: "Ortografia", status: [false, false, false, false]}] },
                        { id: "sub_da", name: "D. Administrativo", color: "emerald", topics: [{id: "t2", text: "Atos Adm", status: [false, false, false, false]}] }
                    ]
                };
                await setDoc(userDocRef, userData);
            }

            onSnapshot(userDocRef, (doc) => {
                if (doc.exists()) {
                    userData = doc.data();
                    renderApp();
                }
            });
        };

        onAuthStateChanged(auth, (u) => { if (u) { user = u; initUserSession(u); } });

        const updateRemoteData = async () => {
            if (user) await updateDoc(doc(db, 'usuarios', user.uid), userData);
        };

        window.toggleStatus = async (subIdx, topIdx, colIdx) => {
            userData.subjects[subIdx].topics[topIdx].status[colIdx] = !userData.subjects[subIdx].topics[topIdx].status[colIdx];
            await updateRemoteData();
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.getElementById(id).classList.add('active');
            if(id === 'evolucao') renderCharts();
        };

        const renderApp = () => {
            document.getElementById('main-edital-title').innerText = userData.title;
            document.getElementById('main-edital-subtitle').innerText = userData.subtitle;
            const container = document.getElementById('edital-container');
            container.innerHTML = '';

            userData.subjects.forEach((sub, sIdx) => {
                const rows = sub.topics.map((top, tIdx) => {
                    const checks = top.status.map((s, cIdx) => `<td class="p-4 text-center"><input type="checkbox" ${s ? 'checked' : ''} onchange="toggleStatus(${sIdx}, ${tIdx}, ${cIdx})"></td>`).join('');
                    return `<tr class="border-b border-slate-50"><td class="p-4 font-bold text-xs text-slate-700">${top.text}</td>${checks}</tr>`;
                }).join('');

                container.innerHTML += `<div class="subject-card">
                    <div class="p-6 border-b border-slate-100 flex justify-between bg-white">
                        <h3 class="font-black text-slate-800">${sub.name}</h3>
                    </div>
                    <table class="w-full"><thead><tr class="bg-slate-50 text-[9px] uppercase text-slate-400"><th class="p-4 text-left">Tópico</th><th>T</th><th>Q</th><th>R7</th><th>R28</th></tr></thead><tbody>${rows}</tbody></table>
                </div>`;
            });
        };

        const renderCharts = () => {
            const ctx = document.getElementById('radarChart');
            new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: userData.subjects.map(s => s.name),
                    datasets: [{ label: 'Progresso %', data: userData.subjects.map(s => 50), borderColor: '#4f46e5' }]
                }
            });
        };
    </script>
</body>
</html>
