<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Edition - PC-AP Login</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        
        :root {
            --primary: #4f46e5;
            --bg: #f8fafc;
            --text-main: #1e293b;
            --border-color: #e2e8f0;
        }

        body { 
            background-color: var(--bg); 
            font-family: 'Plus Jakarta Sans', sans-serif; 
            color: var(--text-main);
            min-height: 100vh;
        }

        .subject-card {
            background: white;
            border-radius: 1.5rem;
            box-shadow: 0 4px 6px -1px rgba(0, 0, 0, 0.05);
            border: 1px solid var(--border-color);
            margin-bottom: 2rem;
            overflow: hidden;
        }

        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        #auth-screen {
            position: fixed;
            inset: 0;
            background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%);
            z-index: 9999;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .auth-card {
            background: white;
            width: 100%;
            max-width: 400px;
            border-radius: 2.5rem;
            padding: 3rem;
            box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.25);
        }

        .active-btn {
            background-color: #4f46e5 !important;
            color: white !important;
        }
    </style>
</head>
<body class="p-4 md:p-8">

    <div id="auth-screen">
        <div class="auth-card">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-3xl font-black shadow-lg">P</div>
                <h2 id="auth-title" class="text-2xl font-black text-slate-900 tracking-tight">Bem-vindo à Elite</h2>
                <p id="auth-subtitle" class="text-slate-500 text-sm font-medium mt-1">Faça login para gerenciar seu edital</p>
            </div>

            <div class="space-y-4">
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1.5 ml-1">E-mail</label>
                    <input type="email" id="auth-email" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                </div>
                <div>
                    <label class="block text-[10px] font-black uppercase text-slate-400 tracking-widest mb-1.5 ml-1">Senha</label>
                    <input type="password" id="auth-password" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                </div>
                
                <div id="auth-error" class="hidden text-rose-500 text-[10px] font-bold uppercase text-center bg-rose-50 py-2 rounded-xl border border-rose-100"></div>

                <button onclick="window.handleAuth()" id="auth-submit-btn" class="w-full bg-indigo-600 text-white font-black py-4.5 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all uppercase text-xs tracking-widest mt-4">
                    Acessar Plataforma
                </button>

                <div class="text-center pt-4">
                    <button onclick="window.toggleAuthMode()" id="auth-toggle-btn" class="text-[10px] font-black uppercase text-indigo-500 hover:text-indigo-700 tracking-widest">Ainda não tem conta? Cadastre-se</button>
                </div>
            </div>
        </div>
    </div>

    <div id="app-content" class="max-w-6xl mx-auto hidden">
        <header class="mb-10 flex flex-col md:flex-row justify-between items-start gap-8">
            <div class="flex-1">
                <div class="flex items-center gap-4 mb-4">
                    <div class="inline-flex items-center px-4 py-1.5 rounded-full bg-indigo-50 text-indigo-700 text-[10px] font-black uppercase tracking-widest border border-indigo-100">
                        PC-AP • Macapá
                    </div>
                    <button onclick="window.userLogout()" class="text-rose-400 hover:text-rose-600 text-[10px] font-black uppercase tracking-widest">Sair</button>
                </div>
                <h1 class="text-5xl font-black text-slate-900 tracking-tight" id="main-title">PC-AP ELITE</h1>
                <p class="text-slate-500 font-semibold text-lg italic">Gestão Avançada de Estudos</p>
            </div>
            
            <div class="bg-white p-7 rounded-[2.5rem] shadow-xl border border-slate-100 min-w-[260px] text-center">
                <div class="text-5xl font-black text-indigo-600 mb-1" id="global-pct">0%</div>
                <div class="text-[10px] uppercase font-extrabold text-slate-400 tracking-widest">Conclusão Total</div>
                <div class="w-full h-2.5 bg-slate-100 rounded-full mt-4 overflow-hidden"><div id="global-bar" class="h-full bg-indigo-500 transition-all duration-1000"></div></div>
            </div>
        </header>

        <nav class="flex gap-2 p-2 bg-white rounded-3xl mb-10 shadow-sm border border-slate-100 overflow-x-auto">
            <button onclick="window.showTab('planner')" id="btn-planner" class="tab-btn active-btn flex-none py-3.5 px-8 rounded-2xl font-extrabold text-xs uppercase tracking-widest">📅 Planner</button>
            <button onclick="window.showTab('evolucao')" id="btn-evolucao" class="tab-btn flex-none text-slate-500 py-3.5 px-8 rounded-2xl font-extrabold text-xs uppercase">📈 Evolução</button>
        </nav>

        <div id="planner" class="tab-content active"><div id="edital-container" class="space-y-8"></div></div>
        <div id="evolucao" class="tab-content">
            <div class="bg-white p-10 rounded-[3rem] border border-slate-200 shadow-sm h-[500px]"><canvas id="radarChart"></canvas></div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        const firebaseConfig = {
            apiKey: "AIzaSyCcHcryUJhFfKlh22-opI4cmgxazrU_Lkw",
            authDomain: "edital-pcap.firebaseapp.com",
            projectId: "edital-pcap",
            storageBucket: "edital-pcap.firebasestorage.app",
            messagingSenderId: "711033539612",
            appId: "1:711033539612:web:c970909cb11d69bbb123d9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        let user = null;
        let isRegistering = false;
        let userData = null;

        window.toggleAuthMode = () => {
            isRegistering = !isRegistering;
            document.getElementById('auth-title').innerText = isRegistering ? "Criar Nova Conta" : "Bem-vindo à Elite";
            document.getElementById('auth-submit-btn').innerText = isRegistering ? "Cadastrar Agora" : "Acessar Plataforma";
            document.getElementById('auth-toggle-btn').innerText = isRegistering ? "Já tem conta? Faça login" : "Ainda não tem conta? Cadastre-se";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value;
            const password = document.getElementById('auth-password').value;
            const errorDiv = document.getElementById('auth-error');
            const btn = document.getElementById('auth-submit-btn');

            if(!email || !password) return;
            btn.disabled = true;
            btn.innerText = "Aguarde...";
            errorDiv.classList.add('hidden');

            try {
                if(isRegistering) {
                    await createUserWithEmailAndPassword(auth, email, password);
                } else {
                    await signInWithEmailAndPassword(auth, email, password);
                }
            } catch (err) {
                errorDiv.innerText = "Erro: Dados inválidos ou e-mail já em uso";
                errorDiv.classList.remove('hidden');
            } finally {
                btn.disabled = false;
                btn.innerText = isRegistering ? "Cadastrar Agora" : "Acessar Plataforma";
            }
        };

        window.userLogout = () => signOut(auth).then(() => location.reload());

        const initUserSession = async (user) => {
            document.getElementById('auth-screen').classList.add('hidden');
            document.getElementById('app-content').classList.remove('hidden');

            const userDocRef = doc(db, 'pcap_users', user.uid); // Novo caminho aceito
            const docSnap = await getDoc(userDocRef);

            if (!docSnap.exists()) {
                const initialData = [
                    { name: "Português", topics: ["Ortografia", "Crase", "Interpretação", "Pontuação", "Concordância"] },
                    { name: "D. Administrativo", topics: ["Atos Adm", "Poderes", "Licitações", "Agentes Públicos"] },
                    { name: "D. Penal", topics: ["Teoria do Crime", "Crimes contra Pessoa", "Crimes contra Patrimônio"] },
                    { name: "História e Geo AP", topics: ["Colonização AP", "Território Federal", "Economia AP"] },
                    { name: "Informática", topics: ["Windows", "Segurança", "Office/LibreOffice"] }
                ];
                userData = { subjects: initialData.map(s => ({ name: s.name, topics: s.topics.map(t => ({ text: t, status: [false, false, false, false] })) })) };
                await setDoc(userDocRef, userData);
            }

            onSnapshot(userDocRef, (doc) => { if (doc.exists()) { userData = doc.data(); renderApp(); } });
        };

        onAuthStateChanged(auth, (u) => { if (u) { user = u; initUserSession(u); } });

        window.toggleStatus = async (subIdx, topIdx, colIdx) => {
            userData.subjects[subIdx].topics[topIdx].status[colIdx] = !userData.subjects[subIdx].topics[topIdx].status[colIdx];
            await updateDoc(doc(db, 'pcap_users', user.uid), userData);
        };

        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-btn', 'text-white'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-btn');
            if(id === 'evolucao') renderCharts();
        };

        const renderApp = () => {
            const container = document.getElementById('edital-container');
            container.innerHTML = '';
            let total = 0, done = 0;

            userData.subjects.forEach((sub, sIdx) => {
                let subTotal = sub.topics.length * 4, subDone = 0;
                const rows = sub.topics.map((top, tIdx) => {
                    const checks = top.status.map((s, cIdx) => {
                        if(s) { done++; subDone++; }
                        total++;
                        return `<td class="p-3 text-center"><input type="checkbox" ${s ? 'checked' : ''} onchange="toggleStatus(${sIdx}, ${tIdx}, ${cIdx})" class="w-5 h-5 accent-indigo-600 cursor-pointer"></td>`;
                    }).join('');
                    return `<tr class="border-b border-slate-50"><td class="p-4 font-bold text-xs text-slate-700">${top.text}</td>${checks}</tr>`;
                }).join('');
                
                const pct = Math.round((subDone/subTotal)*100);
                container.innerHTML += `<div class="subject-card">
                    <div class="p-6 border-b border-slate-100 flex justify-between items-center bg-white">
                        <h3 class="font-black text-slate-800 uppercase">${sub.name}</h3>
                        <span class="text-xl font-black text-indigo-600">${pct}%</span>
                    </div>
                    <table class="w-full text-left">
                        <thead class="bg-slate-50 text-[9px] font-black uppercase text-slate-400">
                            <tr><th class="p-4">Tópico</th><th class="text-center">T</th><th class="text-center">Q</th><th class="text-center">R7</th><th class="text-center">R28</th></tr>
                        </thead>
                        <tbody>${rows}</tbody>
                    </table>
                </div>`;
            });
            const globalPct = Math.round((done/total)*100);
            document.getElementById('global-pct').innerText = globalPct + '%';
            document.getElementById('global-bar').style.width = globalPct + '%';
        };

        let myChart = null;
        const renderCharts = () => {
            const ctx = document.getElementById('radarChart');
            if(myChart) myChart.destroy();
            myChart = new Chart(ctx, {
                type: 'radar',
                data: {
                    labels: userData.subjects.map(s => s.name),
                    datasets: [{ label: 'Progresso %', data: userData.subjects.map(s => {
                        let d = 0; s.topics.forEach(t => t.status.forEach(st => { if(st) d++; }));
                        return Math.round((d/(s.topics.length*4))*100);
                    }), borderColor: '#4f46e5', backgroundColor: 'rgba(79, 70, 229, 0.1)' }]
                },
                options: { maintainAspectRatio: false, scales: { r: { min: 0, max: 100 } } }
            });
        };
    </script>
</body>
</html>
