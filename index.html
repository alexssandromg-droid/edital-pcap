<!DOCTYPE html>
<html lang="pt-pt">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Elite Edition - PC-AP Planner</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @import url('https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@300;400;500;600;700;800&display=swap');
        :root { --primary: #4f46e5; --bg: #f8fafc; --text: #1e293b; }
        body { background-color: var(--bg); font-family: 'Plus Jakarta Sans', sans-serif; color: var(--text); min-height: 100vh; }
        
        .auth-screen { position: fixed; inset: 0; background: linear-gradient(135deg, #4f46e5 0%, #312e81 100%); z-index: 9999; display: flex; align-items: center; justify-content: center; padding: 20px; }
        .card { background: white; border-radius: 1.5rem; box-shadow: 0 4px 6px -1px rgba(0,0,0,0.05); border: 1px solid #e2e8f0; margin-bottom: 1.5rem; overflow: hidden; }
        
        .tab-content { display: none; }
        .tab-content.active { display: block; animation: fadeIn 0.4s ease-out; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
        
        .active-tab { background-color: #4f46e5 !important; color: white !important; }
        
        input[type="checkbox"] { appearance: none; width: 1.2rem; height: 1.2rem; border: 2px solid #cbd5e1; border-radius: 5px; cursor: pointer; display: grid; place-content: center; transition: 0.2s; }
        input[type="checkbox"]:checked { border-color: var(--primary); background-color: #f5f3ff; }
        input[type="checkbox"]:checked::after { content: "✓"; color: var(--primary); font-size: 10px; font-weight: 900; }
    </style>
</head>
<body class="p-4 md:p-8">

    <!-- ECRÃ DE LOGIN -->
    <div id="auth-screen" class="auth-screen">
        <div class="bg-white w-full max-w-sm rounded-[2.5rem] p-8 shadow-2xl">
            <div class="text-center mb-8">
                <div class="w-16 h-16 bg-indigo-600 rounded-2xl mx-auto mb-4 flex items-center justify-center text-white text-3xl font-black">P</div>
                <h2 id="auth-title" class="text-2xl font-black text-slate-900">PC-AP Elite</h2>
                <p id="auth-subtitle" class="text-slate-500 text-sm font-medium">Acesso ao Planner Operacional</p>
            </div>
            <div class="space-y-4">
                <input type="email" id="auth-email" placeholder="E-mail" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                <input type="password" id="auth-password" placeholder="Senha" class="w-full p-4 rounded-2xl bg-slate-50 border border-slate-100 font-bold text-sm outline-none focus:ring-2 focus:ring-indigo-500/20">
                <div id="auth-error" class="hidden text-rose-500 text-[10px] font-bold uppercase text-center bg-rose-50 py-2 rounded-xl border border-rose-100"></div>
                <button onclick="window.handleAuth()" id="auth-btn" class="w-full bg-indigo-600 text-white font-black py-4 rounded-2xl shadow-xl hover:bg-indigo-700 transition-all uppercase text-xs tracking-widest mt-2">Entrar</button>
                <button onclick="window.toggleAuthMode()" id="auth-toggle" class="w-full text-[10px] font-black uppercase text-indigo-500 mt-2">Novo por aqui? Cadastre-se</button>
            </div>
        </div>
    </div>

    <!-- CONTEÚDO PRINCIPAL -->
    <div id="main-app" class="max-w-5xl mx-auto hidden">
        <header class="mb-8 flex flex-col md:flex-row justify-between items-start gap-6">
            <div>
                <span class="inline-block px-3 py-1 rounded-full bg-indigo-50 text-indigo-600 text-[10px] font-black uppercase tracking-tighter border border-indigo-100 mb-2">Macapá • Ciclo 2026</span>
                <h1 class="text-4xl font-black text-slate-900 tracking-tight">MEU PLANNER</h1>
                <p id="welcome-msg" class="text-slate-500 font-bold text-lg">Olá, Agente!</p>
            </div>
            <div class="flex items-center gap-4">
                <div class="bg-white px-6 py-4 rounded-3xl border border-slate-100 shadow-sm text-center">
                    <div id="progress-pct" class="text-3xl font-black text-indigo-600">0%</div>
                    <div class="text-[9px] uppercase font-black text-slate-400">Geral</div>
                </div>
                <button onclick="window.handleLogout()" class="text-rose-400 hover:text-rose-600 font-black text-[10px] uppercase">Sair</button>
            </div>
        </header>

        <!-- NAVEGAÇÃO -->
        <nav class="flex gap-2 p-1.5 bg-white rounded-2xl mb-8 shadow-sm border border-slate-100 w-fit">
            <button onclick="window.showTab('planner')" id="btn-planner" class="tab-btn active-tab px-6 py-2.5 rounded-xl font-black text-[11px] uppercase tracking-widest transition-all">📅 Edital</button>
            <button onclick="window.showTab('admin')" id="btn-admin" class="tab-btn hidden px-6 py-2.5 rounded-xl font-black text-[11px] uppercase tracking-widest text-rose-500 bg-rose-50">👑 Adm</button>
        </nav>

        <!-- ABA PLANNER -->
        <div id="planner" class="tab-content active">
            <div class="flex justify-between items-center mb-6">
                <h3 class="text-xs font-black uppercase text-slate-400 tracking-widest">Edital Verticalizado Personalizado</h3>
                <button onclick="window.addSubject()" class="bg-slate-900 text-white px-4 py-2 rounded-xl text-[10px] font-black uppercase shadow-lg">+ Matéria</button>
            </div>
            <div id="edital-list" class="space-y-6"></div>
        </div>

        <!-- ABA ADMIN -->
        <div id="admin" class="tab-content">
            <div class="card p-8">
                <h3 class="text-xl font-black mb-6">Controle de Alunos Inscritos</h3>
                <div class="overflow-x-auto">
                    <table class="w-full text-left text-xs">
                        <thead class="bg-slate-50 text-[10px] font-black uppercase text-slate-400">
                            <tr><th class="p-4">E-mail do Aluno</th><th class="p-4 text-center">Estado</th><th class="p-4 text-right">Último Acesso</th></tr>
                        </thead>
                        <tbody id="admin-users"></tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <script type="module">
        import { initializeApp } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-app.js";
        import { getAuth, signInWithEmailAndPassword, createUserWithEmailAndPassword, onAuthStateChanged, signOut, signInWithCustomToken, signInAnonymously } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-auth.js";
        import { getFirestore, doc, setDoc, getDoc, onSnapshot, updateDoc, collection, getDocs } from "https://www.gstatic.com/firebasejs/11.0.2/firebase-firestore.js";

        // CONFIGURAÇÕES DO FIREBASE (ALEX)
        const firebaseConfig = {
            apiKey: "AIzaSyCcHcryUJhFfKlh22-opI4cmgxazrU_Lkw",
            authDomain: "edital-pcap.firebaseapp.com",
            projectId: "edital-pcap",
            storageBucket: "edital-pcap.firebasestorage.app",
            messagingSenderId: "711033539612",
            appId: "1:711033539612:web:c970909cb11d69bbb123d9"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);
        const appId = "pcap-base-2026";
        const ADMIN_EMAIL = "alexssandro.m.g@gmail.com";

        let user = null;
        let userData = null;
        let isRegistering = false;

        // --- AUTENTICAÇÃO ---
        window.toggleAuthMode = () => {
            isRegistering = !isRegistering;
            document.getElementById('auth-title').innerText = isRegistering ? "Nova Conta" : "PC-AP Elite";
            document.getElementById('auth-btn').innerText = isRegistering ? "Cadastrar" : "Entrar";
            document.getElementById('auth-toggle').innerText = isRegistering ? "Já tem conta? Login" : "Novo por aqui? Cadastre-se";
        };

        window.handleAuth = async () => {
            const email = document.getElementById('auth-email').value.trim();
            const pass = document.getElementById('auth-password').value;
            const errDiv = document.getElementById('auth-error');
            if(!email || !pass) return;

            try {
                if(isRegistering) await createUserWithEmailAndPassword(auth, email, pass);
                else await signInWithEmailAndPassword(auth, email, pass);
            } catch (e) {
                errDiv.innerText = "Acesso Negado. Verifique os dados.";
                errDiv.classList.remove('hidden');
            }
        };

        window.handleLogout = () => signOut(auth).then(() => location.reload());

        // --- GESTÃO DE SESSÃO ---
        onAuthStateChanged(auth, async (u) => {
            if (u) {
                user = u;
                document.getElementById('auth-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('welcome-msg').innerText = `Bem-vindo, Agente ${user.email.split('@')[0]}!`;

                // Verificar Admin
                if(user.email.toLowerCase().trim() === ADMIN_EMAIL.trim()) {
                    document.getElementById('btn-admin').classList.remove('hidden');
                }

                // Salvar perfil para o Adm ver
                const profileRef = doc(db, 'artifacts', appId, 'public', 'data', 'userProfiles', user.uid);
                await setDoc(profileRef, { email: user.email, lastSeen: new Date().toISOString() }, { merge: true });

                // Carregar dados privados
                const userRef = doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'edital');
                const snap = await getDoc(userRef);

                if (!snap.exists()) {
                    // Edital Inicial Padrão
                    userData = {
                        subjects: [
                            { name: "Português", topics: [{id: "t1", text: "Ortografia", status: [false,false,false,false]}] },
                            { name: "Direito Penal", topics: [{id: "t2", text: "Teoria do Crime", status: [false,false,false,false]}] }
                        ]
                    };
                    await setDoc(userRef, userData);
                }

                onSnapshot(userRef, (doc) => {
                    if (doc.exists()) {
                        userData = doc.data();
                        renderPlanner();
                    }
                });
            }
        });

        // --- PLANNER LÓGICA ---
        window.showTab = (id) => {
            document.querySelectorAll('.tab-content').forEach(c => c.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active-tab'));
            document.getElementById(id).classList.add('active');
            document.getElementById('btn-' + id).classList.add('active-tab');
            if(id === 'admin') window.loadAdmin();
        };

        window.toggleTopic = async (subIdx, topIdx, colIdx) => {
            userData.subjects[subIdx].topics[topIdx].status[colIdx] = !userData.subjects[subIdx].topics[topIdx].status[colIdx];
            await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'edital'), userData);
        };

        window.addSubject = async () => {
            const name = prompt("Nome da Matéria:");
            if(!name) return;
            userData.subjects.push({ name, topics: [] });
            await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'edital'), userData);
        };

        window.addTopic = async (subIdx) => {
            const text = prompt("Nome do Tópico:");
            if(!text) return;
            userData.subjects[subIdx].topics.push({ id: Math.random().toString(36).substr(2, 9), text, status: [false,false,false,false] });
            await updateDoc(doc(db, 'artifacts', appId, 'users', user.uid, 'settings', 'edital'), userData);
        };

        const renderPlanner = () => {
            const list = document.getElementById('edital-list');
            list.innerHTML = '';
            let total = 0, done = 0;

            userData.subjects.forEach((sub, sIdx) => {
                let subTotal = sub.topics.length * 4, subDone = 0;
                const rows = sub.topics.map((top, tIdx) => {
                    const checks = top.status.map((s, cIdx) => {
                        if(s) { done++; subDone++; } total++;
                        return `<td class="p-4 text-center"><div class="flex justify-center"><input type="checkbox" ${s?'checked':''} onchange="toggleTopic(${sIdx}, ${tIdx}, ${cIdx})"></div></td>`;
                    }).join('');
                    return `<tr class="border-b border-slate-50 hover:bg-slate-50/50"><td class="p-4 font-bold text-xs text-slate-700">${top.text}</td>${checks}</tr>`;
                }).join('');

                const pct = subTotal > 0 ? Math.round((subDone/subTotal)*100) : 0;
                list.innerHTML += `
                    <div class="card">
                        <div class="p-6 border-b flex justify-between items-center bg-white">
                            <h3 class="font-black uppercase text-slate-800 tracking-tight">${sub.name}</h3>
                            <span class="text-xl font-black text-indigo-600">${pct}%</span>
                        </div>
                        <table class="w-full text-left text-[9px] uppercase text-slate-400">
                            <thead><tr><th class="p-4">Tópico</th><th class="text-center">T</th><th class="text-center">Q</th><th class="text-center">R7</th><th class="text-center">R28</th></tr></thead>
                            <tbody class="text-slate-700">${rows}</tbody>
                        </table>
                        <div class="p-4 bg-slate-50/50 border-t"><button onclick="addTopic(${sIdx})" class="text-[9px] font-black uppercase text-indigo-500">+ Adicionar Tópico</button></div>
                    </div>`;
            });

            const global = total > 0 ? Math.round((done/total)*100) : 0;
            document.getElementById('progress-pct').innerText = global + '%';
        };

        // --- ADMIN LÓGICA ---
        window.loadAdmin = async () => {
            const body = document.getElementById('admin-users');
            body.innerHTML = '<tr><td colspan="3" class="p-8 text-center text-slate-400 italic">Buscando Agentes...</td></tr>';
            try {
                const snap = await getDocs(collection(db, 'artifacts', appId, 'public', 'data', 'userProfiles'));
                body.innerHTML = '';
                snap.forEach(d => {
                    const p = d.data();
                    body.innerHTML += `
                        <tr class="border-b">
                            <td class="p-4 font-bold text-slate-700">${p.email}</td>
                            <td class="p-4 text-center"><span class="bg-emerald-50 text-emerald-600 px-3 py-1 rounded-lg font-black uppercase">Ativo</span></td>
                            <td class="p-4 text-right text-slate-400 font-bold">${new Date(p.lastSeen).toLocaleDateString('pt-BR')}</td>
                        </tr>`;
                });
            } catch (e) { body.innerHTML = '<tr><td colspan="3" class="p-4 text-rose-500">Erro de Permissão.</td></tr>'; }
        };
    </script>
</body>
</html>
